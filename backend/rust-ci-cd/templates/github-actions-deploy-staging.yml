name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: Image ref or digest to deploy
        required: true
        default: IMAGE_REF
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    env:
      IMAGE_REF: ${{ inputs.image_ref || 'IMAGE_REF' }}
      STAGING_URL: ${{ vars.STAGING_URL }}
      MIGRATION_COMMAND: MIGRATION_COMMAND
      DEPLOY_COMMAND: DEPLOY_COMMAND

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy known image
        run: |
          set -euo pipefail
          echo "Deploying ${IMAGE_REF} to staging"
          ${DEPLOY_COMMAND}

      - name: Run migrations
        if: env.MIGRATION_COMMAND != 'MIGRATION_COMMAND'
        run: |
          set -euo pipefail
          ${MIGRATION_COMMAND}

      - name: Smoke test
        env:
          BASE_URL: ${{ env.STAGING_URL }}
        run: bash templates/smoke-test.sh

      - name: Deployment summary
        run: |
          {
            echo "## Staging deployment"
            echo ""
            echo "- Image: \`${IMAGE_REF}\`"
            echo "- Environment: staging"
            echo "- Smoke test: completed"
            echo "- Migrations: configured command was run only when set"
          } >> "$GITHUB_STEP_SUMMARY"
